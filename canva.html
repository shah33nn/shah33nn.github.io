<html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wear Some Flowers | Visuals</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       Wear Some Flowers - Custom Background Page
       ========================================================================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* Full-screen Background Image */
      background-image: url('https://i.ibb.co/CpbCsDLf/New-Project-1.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      
      font-family: 'Libre Baskerville', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #3E362E;
    }

    /* --- Header & Logo --- */
    header {
      width: 100%;
      padding: 4rem 1rem 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .animated-logo {
      width: 100%;
      max-width: 450px; /* Ensures the logo is prominent but fits on phones */
      height: auto;
      filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.15));
      animation: fadeInDown 1.2s ease-out;
    }

    /* --- Content Area (Frosted Glass Effect) --- */
    main {
      /* Soft, semi-transparent cream background */
      background: rgba(253, 251, 247, 0.85); 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      
      padding: 3rem 2.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
      max-width: 600px;
      margin: 2rem 1.5rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
      animation: fadeInUp 1.2s ease-out 0.3s backwards;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 2.2rem;
      color: #5A7A3A;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.7;
      color: #3E362E;
    }

    /* --- Animations --- */
    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <img src="https://i.ibb.co/9m8hvbYF/ezgif-50554c350eccf1a4.gif" alt="Wear Some Flowers Animated Logo" class="animated-logo">
  </header>

  <main>
    <h1>The Conservatory</h1>
    <p>A space for whimsical clothing, vintage discoveries, and taking a moment to breathe.</p>
  </main>

</body>
</html>
