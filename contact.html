<html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Wear Some Flowers</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       Wear Some Flowers - Contact Page Styles
       ========================================================================== */

    :root {
      --warm-canvas: #FDFBF7;
      --card-bg: #FFFFFF;
      --text-dark: #3E362E;
      --botanical-green: #7A9C59;
      --botanical-dark: #5A7A3A;
      --dusty-blue: #AEC6CF;
      --petal-peach: #F4D3C9;
      --border-color: #EAE6DF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--warm-canvas);
      color: var(--text-dark);
      font-family: 'Libre Baskerville', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* --- Typography --- */
    h1, h2, h3, .brand-logo {
      font-family: 'Lora', serif;
      font-weight: 500;
      color: var(--botanical-dark);
    }

    /* --- Navigation --- */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      background-color: transparent;
      position: relative;
      z-index: 10;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-logo {
      font-size: 1.5rem;
      text-decoration: none;
      color: var(--botanical-green);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-dark);
      font-size: 1.1rem;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--botanical-green);
    }

    /* --- Contact Form Layout --- */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4rem 2rem;
      position: relative;
      z-index: 10;
    }

    .contact-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 3.5rem;
      max-width: 600px;
      width: 100%;
      box-shadow: 6px 6px 0px var(--petal-peach);
      animation: fadeInUp 1s ease-out forwards;
      text-align: center;
    }

    .contact-container h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .contact-container p {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    /* --- Form Elements --- */
    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      text-align: left;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: var(--text-dark);
    }

    input, textarea {
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      padding: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background-color: var(--warm-canvas);
      color: var(--text-dark);
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--botanical-green);
      box-shadow: 0 0 0 3px rgba(122, 156, 89, 0.15);
      background-color: #FFFFFF;
    }

    textarea {
      resize: vertical;
      min-height: 150px;
    }

    /* --- Button --- */
    .submit-button {
      background-color: var(--botanical-green);
      color: var(--warm-canvas);
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--dusty-blue);
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .submit-button:hover {
      background-color: var(--botanical-dark);
      transform: translateY(-2px);
      box-shadow: 6px 6px 0px var(--dusty-blue);
    }

    /* --- Footer --- */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--botanical-green);
      position: relative;
      z-index: 10;
    }

    /* --- Animations & Background --- */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .floating-elements {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.3;
      animation: float 8s infinite ease-in-out;
    }

    .blob-1 { width: 350px; height: 350px; background-color: var(--petal-peach); top: -5%; left: -5%; }
    .blob-2 { width: 450px; height: 450px; background-color: var(--dusty-blue); bottom: -10%; right: -5%; animation-delay: -3s; opacity: 0.2; }
  </style>
</head>
<body>

  <div class="floating-elements">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <nav>
    <a href="index.html" class="brand-logo">wear some flowers</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="community.html">Community</a>
    </div>
  </nav>

  <main>
    <div class="contact-container">
      <h1>Send us a note</h1>
      <p>Whether you have a question about an order, a vintage piece, or just want to say hello, we'd love to hear from you.</p>
      
      <form action="https://formspree.io/f/xqejlqqw" method="POST">
        
        <div class="input-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Doe" required>
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required>
        </div>

        <div class="input-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" placeholder="How can our garden help yours grow?" required></textarea>
        </div>

        <button type="submit" class="submit-button">Send Message</button>
      </form>
    </div>
  </main>

  <footer>
    <p>Time to enjoy a cup of coffee. ☕</p>
  </footer>

</body>
</html>
